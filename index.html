    <!-- Auto-Translate: Detects Spanish browsers and translates automatically (no visible UI) -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        // ROBUST: Check for ?lang=es OR Spanish browser
        var urlParams = new URLSearchParams(window.location.search);
        var forceLang = urlParams.get("lang");
        var userLang = navigator.language || navigator.userLanguage || "";
        var isSpanish = userLang.startsWith("es") || forceLang === "es";

        // 1. If Spanish is detected/forced, SET THE COOKIE immediately
        if (isSpanish) {
          document.cookie =
            "googtrans=/en/es; path=/; domain=" + window.location.hostname;
          document.cookie = "googtrans=/en/es; path=/"; // Fallback
        } else {
          // If NOT Spanish, clear the cookie to prevent "stuck in Spanish" state
          document.cookie =
            "googtrans=; path=/; domain=" +
            window.location.hostname +
            "; expires=Thu, 01 Jan 1970 00:00:00 UTC";
          document.cookie =
            "googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC";
        }

        // 2. Initialize the widget
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "es,es-419",
            autoDisplay: false,
          },
          "google_translate_element",
        );
      }
    </script>
    <script
      type="text/javascript"
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"

    ></script>
